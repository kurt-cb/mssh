<svg width="100%" viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, -apple-system, sans-serif">
  <title>Hop chain integrity</title>
  <desc>Diagram showing how a user's connection traverses two intermediate hop hosts to reach a destination, with the destination able to verify the user's identity end-to-end via cryptographic chain attestation.</desc>

  <defs>
    <marker id="arrow3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="500" fill="#2C2C2A">Hop chain integrity</text>
  <text x="400" y="56" text-anchor="middle" font-size="13" fill="#5F5E5A">User identity verified end-to-end through jump hosts</text>

  <!-- User -->
  <rect x="40" y="120" width="130" height="70" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
  <text x="105" y="146" text-anchor="middle" font-size="14" font-weight="500" fill="#26215C">User</text>
  <text x="105" y="164" text-anchor="middle" font-size="11" fill="#3C3489">alice@example</text>
  <text x="105" y="178" text-anchor="middle" font-size="11" fill="#3C3489">cert serial 0123</text>

  <!-- Hop 1 -->
  <rect x="220" y="120" width="130" height="70" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
  <text x="285" y="146" text-anchor="middle" font-size="14" font-weight="500" fill="#412402">Hop 1</text>
  <text x="285" y="164" text-anchor="middle" font-size="11" fill="#633806">bastion-east</text>
  <text x="285" y="178" text-anchor="middle" font-size="11" fill="#633806">cert serial a1b2</text>

  <!-- Hop 2 -->
  <rect x="400" y="120" width="130" height="70" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
  <text x="465" y="146" text-anchor="middle" font-size="14" font-weight="500" fill="#412402">Hop 2</text>
  <text x="465" y="164" text-anchor="middle" font-size="11" fill="#633806">jump-prod</text>
  <text x="465" y="178" text-anchor="middle" font-size="11" fill="#633806">cert serial c3d4</text>

  <!-- Destination -->
  <rect x="580" y="120" width="180" height="70" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="670" y="146" text-anchor="middle" font-size="14" font-weight="500" fill="#04342C">Destination</text>
  <text x="670" y="164" text-anchor="middle" font-size="11" fill="#085041">webserver1.prod</text>
  <text x="670" y="178" text-anchor="middle" font-size="11" fill="#085041">validates entire chain</text>

  <!-- Connection arrows -->
  <line x1="170" y1="155" x2="218" y2="155" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow3)"/>
  <line x1="350" y1="155" x2="398" y2="155" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow3)"/>
  <line x1="530" y1="155" x2="578" y2="155" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow3)"/>

  <!-- Chain signature trace below -->
  <text x="60" y="240" font-size="12" font-weight="500" fill="#2C2C2A">What the destination receives:</text>

  <rect x="60" y="255" width="700" height="32" rx="6" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
  <text x="74" y="276" font-size="11" fill="#26215C">user cert + auth signature (signed by alice's key, over session id of leg 1)</text>

  <rect x="60" y="295" width="350" height="32" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="74" y="316" font-size="11" fill="#412402">hop 1 attestation (signed by bastion-east)</text>

  <rect x="60" y="335" width="350" height="32" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="74" y="356" font-size="11" fill="#412402">hop 2 attestation (signed by jump-prod)</text>

  <!-- Annotations on the right -->
  <text x="430" y="316" font-size="11" fill="#5F5E5A">inbound: alice • outbound: jump-prod</text>
  <text x="430" y="356" font-size="11" fill="#5F5E5A">inbound: bastion-east • outbound: webserver1.prod</text>

  <!-- Key insight box -->
  <rect x="60" y="390" width="700" height="50" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="74" y="410" font-size="12" font-weight="500" fill="#04342C">Destination verifies:</text>
  <text x="74" y="426" font-size="11" fill="#085041">• Alice's auth signature directly — no hop can rewrite identity</text>
  <text x="430" y="426" font-size="11" fill="#085041">• Each hop's cert authorizes its participation</text>
</svg>
