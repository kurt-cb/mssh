<svg width="100%" viewBox="0 0 800 540" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, -apple-system, sans-serif">
  <title>Trust model: classic SSH vs mssh</title>
  <desc>Two side-by-side trust diagrams. Classic SSH on the left shows TOFU host-key acceptance with no third-party verification. mssh on the right shows certificate-based identity anchored to a trusted CA.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-q" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#C04828" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- LEFT: Classic SSH -->
  <text x="200" y="38" text-anchor="middle" font-size="18" font-weight="500" fill="#2C2C2A">Classic SSH</text>
  <text x="200" y="58" text-anchor="middle" font-size="13" fill="#5F5E5A">Trust on first use</text>

  <!-- Client (classic) -->
  <rect x="60" y="90" width="280" height="80" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="200" y="118" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Client</text>
  <text x="200" y="138" text-anchor="middle" font-size="12" fill="#5F5E5A">known_hosts (cached on first connection)</text>
  <text x="200" y="156" text-anchor="middle" font-size="12" fill="#5F5E5A">authorized_keys (manually distributed)</text>

  <!-- Question mark in middle for classic -->
  <text x="200" y="225" text-anchor="middle" font-size="36" font-weight="500" fill="#C04828">?</text>
  <text x="200" y="250" text-anchor="middle" font-size="11" fill="#C04828">Is this the right host?</text>
  <text x="200" y="265" text-anchor="middle" font-size="11" fill="#C04828">No one to ask.</text>

  <!-- Server (classic) -->
  <rect x="60" y="290" width="280" height="80" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="200" y="318" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Server</text>
  <text x="200" y="338" text-anchor="middle" font-size="12" fill="#5F5E5A">host key (generated at install)</text>
  <text x="200" y="356" text-anchor="middle" font-size="12" fill="#5F5E5A">authorized_keys (per-user, on disk)</text>

  <!-- Arrow client to server (classic) -->
  <line x1="200" y1="170" x2="200" y2="186" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="200" y1="275" x2="200" y2="290" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Problems list (classic) -->
  <rect x="60" y="400" width="280" height="120" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text x="76" y="422" font-size="12" font-weight="500" fill="#791F1F">Failure modes</text>
  <text x="76" y="442" font-size="11" fill="#791F1F">• Users click through host-key warnings</text>
  <text x="76" y="458" font-size="11" fill="#791F1F">• Long-lived keys, no rotation discipline</text>
  <text x="76" y="474" font-size="11" fill="#791F1F">• Manual authorized_keys distribution</text>
  <text x="76" y="490" font-size="11" fill="#791F1F">• Password fallback still common</text>
  <text x="76" y="506" font-size="11" fill="#791F1F">• Revocation requires touching every server</text>

  <!-- Divider -->
  <line x1="400" y1="80" x2="400" y2="520" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 4"/>

  <!-- RIGHT: mssh -->
  <text x="600" y="38" text-anchor="middle" font-size="18" font-weight="500" fill="#2C2C2A">mssh</text>
  <text x="600" y="58" text-anchor="middle" font-size="13" fill="#5F5E5A">Certificate-anchored identity</text>

  <!-- CA at top (mssh) -->
  <rect x="460" y="90" width="280" height="80" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
  <text x="600" y="118" text-anchor="middle" font-size="14" font-weight="500" fill="#26215C">Certificate Authority</text>
  <text x="600" y="138" text-anchor="middle" font-size="12" fill="#3C3489">Issues short-lived certs after 2FA</text>
  <text x="600" y="156" text-anchor="middle" font-size="12" fill="#3C3489">Audit log of every issuance</text>

  <!-- Client (mssh) -->
  <rect x="460" y="220" width="130" height="70" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
  <text x="525" y="246" text-anchor="middle" font-size="14" font-weight="500" fill="#042C53">Client</text>
  <text x="525" y="264" text-anchor="middle" font-size="11" fill="#0C447C">Holds one cert</text>
  <text x="525" y="280" text-anchor="middle" font-size="11" fill="#0C447C">(short-lived)</text>

  <!-- Server (mssh) -->
  <rect x="610" y="220" width="130" height="70" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
  <text x="675" y="246" text-anchor="middle" font-size="14" font-weight="500" fill="#042C53">Server</text>
  <text x="675" y="264" text-anchor="middle" font-size="11" fill="#0C447C">Holds one cert</text>
  <text x="675" y="280" text-anchor="middle" font-size="11" fill="#0C447C">+ trust root</text>

  <!-- Arrows from CA to both client and server -->
  <line x1="540" y1="170" x2="525" y2="220" stroke="#534AB7" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="660" y1="170" x2="675" y2="220" stroke="#534AB7" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="488" y="200" font-size="10" fill="#3C3489">issues cert</text>
  <text x="678" y="200" font-size="10" fill="#3C3489">issues cert</text>

  <!-- Mutual auth arrow between client and server -->
  <line x1="590" y1="255" x2="610" y2="255" stroke="#185FA5" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)"/>

  <!-- Trust root indicator (small) -->
  <rect x="540" y="320" width="120" height="60" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="600" y="343" text-anchor="middle" font-size="13" font-weight="500" fill="#04342C">Trust root</text>
  <text x="600" y="362" text-anchor="middle" font-size="11" fill="#085041">Anchors all validation</text>
  <text x="600" y="376" text-anchor="middle" font-size="11" fill="#085041">Pre-configured</text>

  <!-- Dashed lines from trust root to both -->
  <line x1="540" y1="335" x2="475" y2="290" stroke="#0F6E56" stroke-width="0.5" stroke-dasharray="3 3"/>
  <line x1="660" y1="335" x2="725" y2="290" stroke="#0F6E56" stroke-width="0.5" stroke-dasharray="3 3"/>

  <!-- Improvements list (mssh) -->
  <rect x="460" y="400" width="280" height="120" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="476" y="422" font-size="12" font-weight="500" fill="#173404">What this gives you</text>
  <text x="476" y="442" font-size="11" fill="#173404">• No TOFU prompts, ever</text>
  <text x="476" y="458" font-size="11" fill="#173404">• Cert validity replaces key rotation chores</text>
  <text x="476" y="474" font-size="11" fill="#173404">• No authorized_keys distribution</text>
  <text x="476" y="490" font-size="11" fill="#173404">• No password authentication, period</text>
  <text x="476" y="506" font-size="11" fill="#173404">• Revocation is one CA call</text>
</svg>
