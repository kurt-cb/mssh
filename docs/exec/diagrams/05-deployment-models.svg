<svg width="100%" viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, -apple-system, sans-serif">
  <title>Deployment topologies</title>
  <desc>Two deployment models side-by-side: embedded CA for small deployments (single host hosts the CA), and external CA for larger deployments (dedicated CA serving multiple sshd hosts).</desc>

  <defs>
    <marker id="arrow5" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="500" fill="#2C2C2A">Two deployment models</text>
  <text x="400" y="56" text-anchor="middle" font-size="13" fill="#5F5E5A">Same protocol, different operational scale</text>

  <!-- LEFT: Embedded CA -->
  <text x="200" y="92" text-anchor="middle" font-size="14" font-weight="500" fill="#444441">Embedded CA — up to 50 principals</text>

  <!-- Big container -->
  <rect x="60" y="110" width="280" height="220" rx="14" fill="#F1EFE8" stroke="#888780" stroke-width="0.5" stroke-dasharray="6 4"/>
  <text x="80" y="132" font-size="11" font-weight="500" fill="#444441">Single host</text>

  <rect x="100" y="160" width="200" height="80" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
  <text x="200" y="186" text-anchor="middle" font-size="13" font-weight="500" fill="#042C53">mssh sshd</text>
  <text x="200" y="206" text-anchor="middle" font-size="11" fill="#0C447C">with embedded CA</text>
  <text x="200" y="222" text-anchor="middle" font-size="11" fill="#0C447C">(single binary)</text>

  <rect x="100" y="260" width="200" height="50" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="200" y="284" text-anchor="middle" font-size="12" font-weight="500" fill="#04342C">File-backed state</text>
  <text x="200" y="300" text-anchor="middle" font-size="11" fill="#085041">$CA_DIR/{certs,audit,...}</text>

  <line x1="200" y1="240" x2="200" y2="258" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow5)"/>

  <!-- Clients on left side -->
  <rect x="60" y="370" width="80" height="40" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.8"/>
  <text x="100" y="394" text-anchor="middle" font-size="11" fill="#26215C">user</text>

  <rect x="160" y="370" width="80" height="40" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.8"/>
  <text x="200" y="394" text-anchor="middle" font-size="11" fill="#26215C">script</text>

  <rect x="260" y="370" width="80" height="40" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.8"/>
  <text x="300" y="394" text-anchor="middle" font-size="11" fill="#26215C">backup</text>

  <line x1="100" y1="370" x2="160" y2="332" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow5)"/>
  <line x1="200" y1="370" x2="200" y2="332" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow5)"/>
  <line x1="300" y1="370" x2="240" y2="332" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow5)"/>

  <text x="200" y="434" text-anchor="middle" font-size="11" fill="#5F5E5A" font-style="italic">Homelab, dev team, edge appliance</text>

  <!-- Divider -->
  <line x1="400" y1="80" x2="400" y2="440" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 4"/>

  <!-- RIGHT: External CA -->
  <text x="600" y="92" text-anchor="middle" font-size="14" font-weight="500" fill="#444441">External CA — production scale</text>

  <!-- CA at top -->
  <rect x="540" y="110" width="180" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
  <text x="630" y="134" text-anchor="middle" font-size="13" font-weight="500" fill="#26215C">CA service</text>
  <text x="630" y="152" text-anchor="middle" font-size="11" fill="#3C3489">Dedicated, HA, audited</text>

  <!-- Multiple sshd hosts -->
  <rect x="460" y="220" width="110" height="60" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
  <text x="515" y="244" text-anchor="middle" font-size="12" font-weight="500" fill="#042C53">sshd</text>
  <text x="515" y="262" text-anchor="middle" font-size="10" fill="#0C447C">webserver1</text>

  <rect x="585" y="220" width="110" height="60" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
  <text x="640" y="244" text-anchor="middle" font-size="12" font-weight="500" fill="#042C53">sshd</text>
  <text x="640" y="262" text-anchor="middle" font-size="10" fill="#0C447C">jumphost1</text>

  <rect x="685" y="220" width="60" height="60" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 3"/>
  <text x="715" y="252" text-anchor="middle" font-size="13" fill="#5F5E5A">. . .</text>
  <text x="715" y="266" text-anchor="middle" font-size="10" fill="#5F5E5A">N hosts</text>

  <line x1="580" y1="166" x2="525" y2="218" stroke="#534AB7" stroke-width="1" marker-end="url(#arrow5)"/>
  <line x1="630" y1="166" x2="640" y2="218" stroke="#534AB7" stroke-width="1" marker-end="url(#arrow5)"/>
  <line x1="680" y1="166" x2="710" y2="218" stroke="#534AB7" stroke-width="1" marker-end="url(#arrow5)"/>
  <text x="500" y="195" font-size="10" fill="#3C3489">REST API (mTLS)</text>

  <!-- Clients on right side -->
  <rect x="460" y="320" width="80" height="40" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.8"/>
  <text x="500" y="344" text-anchor="middle" font-size="11" fill="#26215C">user pool</text>

  <rect x="560" y="320" width="80" height="40" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.8"/>
  <text x="600" y="344" text-anchor="middle" font-size="11" fill="#26215C">CI/CD</text>

  <rect x="660" y="320" width="80" height="40" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.8"/>
  <text x="700" y="344" text-anchor="middle" font-size="11" fill="#26215C">automation</text>

  <line x1="500" y1="320" x2="515" y2="282" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow5)"/>
  <line x1="600" y1="320" x2="640" y2="282" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow5)"/>
  <line x1="700" y1="320" x2="715" y2="282" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow5)"/>

  <text x="600" y="434" text-anchor="middle" font-size="11" fill="#5F5E5A" font-style="italic">Enterprise, integrated with LDAP/AD, SIEM, approval workflows</text>
</svg>
